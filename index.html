<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fff5f7; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-lg p-6 border border-pink-100">
        <h1 class="text-2xl font-bold text-center text-pink-500 mb-6">📚 Study Planner AI</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">ชื่อวิชา</label>
                <input type="text" id="name" placeholder="เช่น วิเคราะห์ระบบ" class="w-full p-3 border rounded-xl focus:outline-pink-400">
            </div>
            
            <div>
                <label class="block text-sm font-semibold mb-1">วันที่เริ่ม</label>
                <input type="date" id="assigned_date" class="w-full p-3 border rounded-xl">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">วันส่ง (Deadline)</label>
                <input type="date" id="deadline" class="w-full p-3 border rounded-xl">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">ระดับความยาก</label>
                <select id="difficulty" class="w-full p-3 border rounded-xl">
                    <option value="1">ง่าย (10 ชม.)</option>
                    <option value="2">ปานกลาง (20 ชม.)</option>
                    <option value="3">ยาก (40 ชม.)</option>
                </select>
            </div>

            <button onclick="addSubject()" class="w-full py-4 bg-pink-500 text-white font-bold rounded-2xl shadow-md hover:bg-pink-600 transition">
                + เพิ่มวิชา
            </button>
        </div>

        <hr class="my-6">

        <h2 class="font-bold text-gray-700 mb-3 flex items-center">
            📋 รายการที่บันทึก
        </h2>
        
        <div id="subjectList" class="space-y-2"></div>

        <div class="grid grid-cols-2 gap-2 mt-6">
            <button onclick="alert('ฟีเจอร์ตารางกำลังพัฒนา')" class="py-2 bg-purple-500 text-white rounded-xl text-sm font-semibold">📅 ตารางปฏิทิน</button>
            <button onclick="alert('ฟีเจอร์ลำดับความสำคัญกำลังพัฒนา')" class="py-2 bg-pink-400 text-white rounded-xl text-sm font-semibold">🔥 ลำดับความสำคัญ</button>
        </div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
