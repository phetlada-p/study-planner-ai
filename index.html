<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner Pro - Wide & Full Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fff5f8; /* สีพื้นหลังชมพูอ่อนตามภาพ */
        }
        .calendar-grid {
            display: grid;
            /* ปรับ grid ให้ขยายตามความกว้างหน้าจอ */
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }
        input[type="checkbox"] { display: none; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white rounded-[3.5rem] shadow-2xl shadow-pink-200/50 overflow-hidden border border-pink-50">
        
        <div class="bg-[#ff85b3] p-12 text-white text-center">
            <h1 class="text-4xl font-bold italic flex items-center justify-center gap-3">
                🌸 Study Planner Pro 📚
            </h1>
            <p class="text-pink-100 text-lg mt-2 font-light">วางแผนการเรียนแบบคนมีวันหยุด (ฉบับจอแสดงผลกว้าง)</p>
        </div>

        <div class="p-6 md:p-12">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-gray-700 font-bold mb-2 text-lg italic">✍️ ชื่อวิชา</label>
                        <input type="text" id="name" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none focus:ring-2 focus:ring-pink-300 text-lg" placeholder="เช่น Robotic, Ai and Mc...">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">📅 วันที่ได้รับงาน</label>
                        <input type="date" id="assigned_date" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2">🏁 วันครบกำหนดส่ง</label>
                        <input type="date" id="deadline" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">📊 ระดับความยาก</label>
                    <select id="difficulty" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none cursor-pointer text-lg">
                        <option value="1">⭐ ง่าย (เป้าหมาย 10 ชม.)</option>
                        <option value="2" selected>⭐⭐ ปานกลาง (เป้าหมาย 30 ชม.)</option>
                        <option value="3">⭐⭐⭐ ยาก (เป้าหมาย 60 ชม.)</option>
                    </select>
                </div>

                <div class="p-6 bg-pink-50/30 rounded-[2.5rem] border border-pink-100">
                    <label class="block text-sm font-bold text-pink-500 mb-4 flex items-center gap-2">
                        🚫 เลือกวันหยุดประจำสัปดาห์ (ไม่นับเวลาเรียน):
                    </label>
                    <div class="flex flex-wrap gap-3">
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="1" onchange="toggleDayStyle(this)"> จ.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="2" onchange="toggleDayStyle(this)"> อ.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="3" onchange="toggleDayStyle(this)"> พ.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="4" onchange="toggleDayStyle(this)"> พฤ.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="5" onchange="toggleDayStyle(this)"> ศ.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="6" onchange="toggleDayStyle(this)"> ส.
                        </label>
                        <label class="day-label cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105">
                            <input type="checkbox" class="day-off-input" value="0" onchange="toggleDayStyle(this)"> อา.
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                    <button onclick="addSubject()" class="bg-[#ff85b3] text-white p-5 rounded-2xl font-bold text-xl shadow-lg shadow-pink-200 hover:scale-105 transition-all">
                        ➕ เพิ่มวิชา
                    </button>
                    <button onclick="init('priority')" class="bg-gradient-to-r from-[#ff85b3] to-[#ffb3d1] text-white p-5 rounded-2xl font-bold text-xl shadow-lg shadow-pink-100 hover:scale-105 transition-all">
                        🔥 จัดลำดับงานด่วน
                    </button>
                    <button onclick="loadSchedule()" class="bg-[#7c66e3] text-white p-5 rounded-2xl font-bold text-xl shadow-lg shadow-indigo-200 hover:scale-105 transition-all flex items-center justify-center gap-2">
                        📅 ดูตารางเรียน
                    </button>
                </div>
            </div>

            <div id="list" class="mt-16 max-w-5xl mx-auto"></div>

            <div id="result" class="mt-16 p-10 bg-[#f8f9ff] rounded-[3.5rem] min-h-[300px] border border-white shadow-inner">
                <div class="text-center py-20 text-gray-400 italic">
                    <div class="text-6xl mb-4">✨</div>
                    กดปุ่มด้านบนเพื่อแสดงตารางอ่านหนังสือแบบกว้างที่นี่ค่ะ
                </div>
            </div>
        </div>
    </div>

    <script>
        let userID = localStorage.getItem('study_planner_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('study_planner_uid', userID);
        const API = ""; 

        
        function toggleDayStyle(el) {
            if(el.checked) {
                el.parentElement.classList.add('bg-pink-400', 'text-white', 'border-pink-400');
            } else {
                el.parentElement.classList.remove('bg-pink-400', 'text-white', 'border-pink-400');
            }
        }

        async function addSubject() {
            const name = document.getElementById('name').value;
            const deadline = document.getElementById('deadline').value;
            const assigned = document.getElementById('assigned_date').value;
            const difficulty = document.getElementById('difficulty').value;
            const dayOffs = Array.from(document.querySelectorAll('.day-off-input:checked')).map(cb => parseInt(cb.value));

            if (!name || !deadline) return alert("กรอกข้อมูลให้ครบก่อนนะคะ");
            localStorage.setItem(`dayoffs_${userID}`, JSON.stringify(dayOffs));

            await fetch(`${API}/subjects`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userID, name, deadline, assigned_date: assigned, difficulty: parseInt(difficulty), day_offs: dayOffs })
            });
            location.reload();
        }

        async function init(mode = 'normal') {
            const res = await fetch(`${API}/subjects?user_id=${userID}`);
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = `<h3 class="font-bold text-gray-500 mb-6 italic text-center text-xl">📖 รายการวิชาของคุณ</h3>`;
            
            if (mode === 'priority') {
                data.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
            }

            let subjectsHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            data.forEach(s => {
                const diffStars = ["⭐ ง่าย", "⭐⭐ ปานกลาง", "⭐⭐⭐ ยาก"][s.difficulty - 1];
                subjectsHTML += `
                <div class="flex justify-between items-center p-6 bg-white rounded-3xl shadow-sm border border-pink-50 hover:shadow-md transition-all">
                    <div>
                        <div class="font-bold text-gray-700 text-lg">${s.name}</div>
                        <div class="text-xs text-gray-400 mb-2">${diffStars}</div>
                        <div class="text-sm text-pink-400 font-medium">ส่ง: ${s.deadline}</div>
                    </div>
                    <button onclick="deleteSubject(${s.id})" class="text-red-200 hover:text-red-500 font-bold transition-colors">ลบ</button>
                </div>`;
            });
            subjectsHTML += `</div>`;
            list.innerHTML += subjectsHTML;

            if (mode === 'priority') {
                document.getElementById('result').innerHTML = `
                    <div class="text-center py-10 animate-pulse">
                        <h3 class="text-4xl font-bold text-[#ff85b3] mb-4 italic">🔥 จัดลำดับสำเร็จ!</h3>
                        <div class="text-7xl mb-6">🎯</div>
                        <p class="text-gray-500 text-lg mb-10">วิชาที่ต้องส่งเร็วที่สุดถูกเลื่อนขึ้นมาให้แล้วค่ะ</p>
                        <div class="max-w-2xl mx-auto">${subjectsHTML.replace(/grid-cols-3/g, 'grid-cols-1')}</div>
                    </div>`;
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function loadSchedule() {
            const res = await fetch(`${API}/schedule?user_id=${userID}`);
            const data = await res.json();
            const savedDayOffs = JSON.parse(localStorage.getItem(`dayoffs_${userID}`)) || [];

            let html = `<h3 class='text-3xl font-bold text-[#7c66e3] mb-12 text-center italic'>📅 ตารางอ่านหนังสือ (แบบขยายกว้าง)</h3>`;
            
            if (data.length === 0) return document.getElementById('result').innerHTML = html + "<p class='text-center py-10 text-gray-400'>ยังไม่มีวิชาค่ะ</p>";

            data.forEach(s => {
                let effectiveDays = 0;
                let checkDate = new Date();
                checkDate.setHours(0,0,0,0);
                for(let i = 0; i < s.day_count; i++) {
                    if (!savedDayOffs.includes(checkDate.getDay())) effectiveDays++;
                    checkDate.setDate(checkDate.getDate() + 1);
                }

                const totalHours = s.difficulty === 3 ? 60 : (s.difficulty === 2 ? 30 : 10);
                const hrsPerDay = effectiveDays > 0 ? totalHours / effectiveDays : totalHours / s.day_count;
                const fHrs = Math.floor(hrsPerDay);
                const fMins = Math.round((hrsPerDay - fHrs) * 60);
                const timeStr = fHrs > 0 ? `${fHrs} ชม. ${fMins} นาที` : `${fMins} นาที`;

                html += `
                <div class="mb-16 bg-white p-10 rounded-[3.5rem] shadow-sm border border-pink-50 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-2 h-full bg-[#7c66e3]"></div>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <h4 class="font-bold text-3xl text-gray-700 ml-4">● ${s.subject}</h4>
                        <div class="bg-indigo-50 text-[#7c66e3] px-6 py-2 rounded-2xl text-sm font-bold border border-indigo-100">
                            เรียนจริง ${effectiveDays} วัน | หยุด ${savedDayOffs.length} วัน/สัปดาห์
                        </div>
                    </div>
                    <div class="calendar-grid">`;

                let displayDate = new Date();
                for(let i = 1; i <= s.day_count; i++) {
                    const isOff = savedDayOffs.includes(displayDate.getDay());
                    html += `
                    <div class="${isOff ? 'bg-gray-50 opacity-40' : 'bg-[#fdfaff] border-pink-100 shadow-sm'} p-5 rounded-[2rem] text-center border transition-all hover:scale-105">
                        <div class="text-[10px] ${isOff ? 'text-gray-400' : 'text-pink-400'} font-bold uppercase mb-2 tracking-widest">Day ${i}</div>
                        <div class="text-[14px] font-extrabold ${isOff ? 'text-gray-400' : 'text-gray-700'}">
                            ${isOff ? '🏖️ พักผ่อน' : '⏳ ' + timeStr}
                        </div>
                    </div>`;
                    displayDate.setDate(displayDate.getDate() + 1);
                }
                html += `</div></div>`;
            });
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteSubject(id) {
            if(confirm("ลบวิชานี้?")) {
                await fetch(`${API}/delete_subject/${id}?user_id=${userID}`, { method: 'DELETE' });
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
