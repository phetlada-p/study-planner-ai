<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Study Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #fff5f7; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #ffe4ec; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto glass-card p-6 md:p-10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-bold text-[#ff4d8d]">🎓 Study Planner 📚</h1>
            <p class="text-gray-400 mt-2 italic">จัดการเวลาเรียนเฉพาะคุณ</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1 space-y-5 border-r border-pink-50 pr-0 lg:pr-8">
                <div class="bg-pink-50 p-6 rounded-[2rem]">
                    <h2 class="font-bold text-gray-700 mb-4 italic text-lg text-center">📝 เพิ่มข้อมูลใหม่</h2>
                    <div class="space-y-4">
                        <input id="name" type="text" placeholder="ชื่อวิชา" class="w-full p-4 rounded-2xl border-none outline-none shadow-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="assigned_date" type="date" class="w-full p-3 rounded-xl border-none outline-none shadow-sm text-sm">
                            <input id="deadline" type="date" class="w-full p-3 rounded-xl border-none outline-none shadow-sm text-sm">
                        </div>
                        <select id="difficulty" class="w-full p-4 rounded-2xl border-none outline-none shadow-sm bg-white text-gray-500">
                            <option value="1">ง่าย (10 ชม.)</option>
                            <option value="2">ปานกลาง (30 ชม.)</option>
                            <option value="3">ยาก (60 ชม.)</option>
                        </select>
                        <button onclick="addSubject()" class="w-full bg-[#ff4d8d] text-white py-4 rounded-2xl font-bold text-xl shadow-lg hover:scale-105 transition-all">
                            + บันทึกวิชา
                        </button>
                    </div>
                </div>

                <div id="list" class="space-y-3">
                    </div>
            </div>

            <div class="lg:col-span-2">
                <div class="flex gap-4 mb-6">
                    <button onclick="loadSchedule()" class="flex-1 bg-[#7c66e3] text-white py-4 rounded-2xl font-bold shadow-lg hover:opacity-90 transition-all">
                        📅 แสดงตารางปฏิทิน
                    </button>
                </div>
                <div id="result" class="bg-white p-6 rounded-[2rem] min-h-[500px] border border-pink-50 shadow-inner overflow-y-auto">
                    <p class="text-center text-gray-300 mt-20 italic">กดปุ่มด้านบนเพื่อจัดตาราง...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="scrip.js"></script>
</body>
</html>
