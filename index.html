<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner Pro - Wide Edition (Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fff5f8; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
        }
        input[type="checkbox"] { display: none; }
        /* เอฟเฟกต์ Fade In สำหรับตาราง */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto bg-white rounded-[3.5rem] shadow-2xl shadow-pink-200/50 overflow-hidden border border-pink-50">
        
        <div class="bg-[#ff85b3] p-10 text-white text-center">
            <h1 class="text-4xl font-bold italic">🌸 Study Planner Pro 📚</h1>
            <p class="text-pink-100 text-lg mt-2">วางแผนการเรียนแบบคนมีวันหยุด</p>
        </div>

        <div class="p-6 md:p-12">
            <div class="max-w-4xl mx-auto space-y-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2 text-lg">ชื่อวิชา</label>
                    <input type="text" id="name" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none focus:ring-2 focus:ring-pink-300" placeholder="เช่น Robotic, Ai and Mc...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm uppercase tracking-wide">📅 วันที่ได้รับงาน</label>
                        <input type="date" id="assigned_date" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold mb-2 text-sm uppercase tracking-wide">🏁 วันครบกำหนดส่ง</label>
                        <input type="date" id="deadline" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-2">📊 ระดับความยาก</label>
                    <select id="difficulty" class="w-full p-4 rounded-2xl bg-pink-50/50 border-none outline-none cursor-pointer">
                        <option value="1">⭐ ง่าย (10 ชม.)</option>
                        <option value="2" selected>⭐⭐ ปานกลาง (30 ชม.)</option>
                        <option value="3">⭐⭐⭐ ยาก (60 ชม.)</option>
                    </select>
                </div>

                <div class="p-6 bg-pink-50/30 rounded-[2.5rem] border border-pink-100">
                    <label class="block text-sm font-bold text-pink-500 mb-4">🚫 เลือกวันหยุดประจำสัปดาห์:</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="1" onchange="toggleColor(this)"> จ.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="2" onchange="toggleColor(this)"> อ.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="3" onchange="toggleColor(this)"> พ.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="4" onchange="toggleColor(this)"> พฤ.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="5" onchange="toggleColor(this)"> ศ.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="6" onchange="toggleColor(this)"> ส.
                        </label>
                        <label class="cursor-pointer px-5 py-2 bg-white border border-pink-200 rounded-full text-sm transition-all hover:scale-105 shadow-sm">
                            <input type="checkbox" class="day-off-input" value="0" onchange="toggleColor(this)"> อา.
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                    <button onclick="addSubject()" class="bg-[#ff85b3] text-white p-5 rounded-3xl font-bold text-xl shadow-lg hover:scale-105 transition-all">➕ เพิ่มวิชา</button>
                    <button onclick="init('priority')" class="bg-[#ffb3d1] text-white p-5 rounded-3xl font-bold text-xl shadow-lg hover:scale-105 transition-all">🔥 งานด่วน</button>
                    <button onclick="loadSchedule()" class="bg-[#7c66e3] text-white p-5 rounded-3xl font-bold text-xl shadow-lg hover:scale-105 transition-all">📅 ดูตารางเรียน</button>
                </div>
            </div>

            <div id="list" class="mt-16 max-w-5xl mx-auto"></div>
            <div id="result" class="mt-10 fade-in"></div>
        </div>
    </div>

    <script>
        let userID = localStorage.getItem('study_planner_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('study_planner_uid', userID);
        const API = ""; 

        function toggleColor(el) {
            el.parentElement.classList.toggle('bg-pink-400', el.checked);
            el.parentElement.classList.toggle('text-white', el.checked);
        }

        async function addSubject() {
            const name = document.getElementById('name').value;
            const deadline = document.getElementById('deadline').value;
            const assigned = document.getElementById('assigned_date').value;
            const difficulty = document.getElementById('difficulty').value;
            const dayOffs = Array.from(document.querySelectorAll('.day-off-input:checked')).map(cb => parseInt(cb.value));

            if (!name || !deadline) return alert("กรอกข้อมูลก่อนนะคะ");
            localStorage.setItem(`dayoffs_${userID}`, JSON.stringify(dayOffs));

            await fetch(`${API}/subjects`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userID, name, deadline, assigned_date: assigned, difficulty: parseInt(difficulty), day_offs: dayOffs })
            });
            location.reload();
        }

        async function init(mode = 'normal') {
            const res = await fetch(`${API}/subjects?user_id=${userID}`);
            let data = await res.json();
            const list = document.getElementById('list');
            
            if (mode === 'priority') {
                data.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
            }

            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">`;
            data.forEach(s => {
                html += `
                <div class="p-5 bg-white rounded-3xl border border-pink-100 shadow-sm flex justify-between items-center">
                    <div><b class="text-gray-700">${s.name}</b><br><small class="text-pink-400">ส่ง: ${s.deadline}</small></div>
                    <button onclick="deleteSubject(${s.id})" class="text-red-300 hover:text-red-500 font-bold">ลบ</button>
                </div>`;
            });
            list.innerHTML = html + `</div>`;
            if (mode === 'priority') document.getElementById('result').innerHTML = `<p class="text-center text-pink-500 font-bold">🎯 จัดลำดับงานด่วนเรียบร้อยแล้ว!</p>`;
        }

        async function loadSchedule() {
            const res = await fetch(`${API}/schedule?user_id=${userID}`);
            const data = await res.json();
            const savedDayOffs = JSON.parse(localStorage.getItem(`dayoffs_${userID}`)) || [];

            let html = `<h3 class="text-3xl font-bold text-[#7c66e3] text-center mb-10 italic">📅 ตารางอ่านหนังสือ </h3>`;

            data.forEach(s => {
                let calcDate = new Date(); 
                calcDate.setHours(0,0,0,0);
                
                let effectiveDays = 0;
                for(let i = 0; i < s.day_count; i++) {
                    if (!savedDayOffs.includes(calcDate.getDay())) effectiveDays++;
                    calcDate.setDate(calcDate.getDate() + 1);
                }

                const totalHrs = s.difficulty === 3 ? 60 : (s.difficulty === 2 ? 30 : 10);
                const hrsPerDay = effectiveDays > 0 ? totalHrs / effectiveDays : totalHrs / s.day_count;
                const h = Math.floor(hrsPerDay);
                const m = Math.round((hrsPerDay - h) * 60);
                const timeStr = h > 0 ? `${h} ชม. ${m} นาที` : `${m} นาที`;

                html += `
                <div class="mb-10 p-8 bg-[#f8f9ff] rounded-[3rem] border border-white shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-2xl font-bold text-gray-700 ml-4">● ${s.subject}</h4>
                        <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold">เรียนจริง ${effectiveDays} วัน</span>
                    </div>
                    <div class="calendar-grid">`;

                let cardDate = new Date();
                cardDate.setHours(0,0,0,0);

                for(let i = 1; i <= s.day_count; i++) {
                    const isOff = savedDayOffs.includes(cardDate.getDay());
                    html += `
                    <div class="${isOff ? 'bg-gray-100 opacity-40' : 'bg-white'} p-5 rounded-[2rem] text-center border border-pink-50 shadow-sm transition-all hover:scale-105">
                        <div class="text-[9px] ${isOff ? 'text-gray-400' : 'text-pink-400'} font-bold mb-2">DAY ${i}</div>
                        <div class="text-[13px] font-bold ${isOff ? 'text-gray-400' : 'text-gray-700'}">
                            ${isOff ? '🏖️ พักผ่อน' : '⏳ ' + timeStr}
                        </div>
                    </div>`;
                    cardDate.setDate(cardDate.getDate() + 1);
                }
                html += `</div></div>`;
            });
            document.getElementById('result').innerHTML = html;
        }

        async function deleteSubject(id) {
            if(confirm("ลบวิชานี้?")) {
                await fetch(`${API}/delete_subject/${id}?user_id=${userID}`, { method: 'DELETE' });
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
