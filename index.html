<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Study Planner AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-pink-50 p-5">
    <div class="max-w-md mx-auto bg-white p-8 rounded-[2rem] shadow-lg border border-pink-100">
        <h1 class="text-3xl font-bold text-pink-500 mb-6 text-center">📚 Study Planner 👩🏻‍🎓</h1>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">ชื่อวิชา</label>
                <input id="name" type="text" placeholder="เช่น Machine Learning" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-pink-300">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">วันที่เริ่ม</label>
                    <input id="assigned_date" type="date" class="w-full p-3 border rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">วันส่ง</label>
                    <input id="deadline" type="date" class="w-full p-3 border rounded-xl outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">ความยาก</label>
                <select id="difficulty" class="w-full p-3 border rounded-xl outline-none bg-white text-gray-700">
                    <option value="1">ง่าย</option>
                    <option value="2">ปานกลาง</option>
                    <option value="3">ยาก</option>
                </select>
            </div>
            <button onclick="addSubject()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md hover:bg-pink-600 transition-all">
                + เพิ่มวิชา
            </button>
        </div>

        <h2 class="font-bold text-gray-700 mb-3 border-b pb-2 italic text-lg">📋 รายการวิชา</h2>
        <div id="list" class="space-y-3"></div>
        
        <div class="flex flex-col gap-2 mt-8">
            <button onclick="loadPriority()" class="w-full bg-purple-500 text-white py-3 rounded-2xl font-bold shadow-md hover:bg-purple-600 transition-all">
                🔥 ดูลำดับความสำคัญ
            </button>
            <button onclick="loadSchedule()" class="w-full bg-blue-500 text-white py-3 rounded-2xl font-bold shadow-md hover:bg-blue-600 transition-all">
                📅 จัดตารางการเรียน
            </button>
        </div>
        
        <div id="result" class="mt-6 p-4 bg-gray-50 rounded-2xl text-sm border border-gray-100 min-h-[50px]"></div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
