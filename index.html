<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Study Planner AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-5">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-indigo-600">📚 Study Planner AI</h1>
        
        <div class="space-y-3 mb-6">
            <input id="name" type="text" placeholder="ชื่อวิชา" class="w-full p-2 border rounded">
            <div class="flex gap-2">
                <input id="deadline" type="date" class="w-full p-2 border rounded">
                <select id="difficulty" class="p-2 border rounded">
                    <option value="1">ง่าย</option>
                    <option value="2">ปานกลาง</option>
                    <option value="3">ยาก</option>
                </select>
            </div>
            <button onclick="addSubject()" class="w-full bg-indigo-500 text-white p-2 rounded hover:bg-indigo-600">บันทึกวิชา</button>
        </div>

        <div id="list" class="space-y-2"></div>
        
        <div class="flex gap-2 mt-6">
            <button onclick="loadSchedule()" class="flex-1 bg-green-500 text-white p-2 rounded">📅 ตารางปฏิทิน</button>
            <button onclick="loadPriority()" class="flex-1 bg-red-500 text-white p-2 rounded">🔥 ลำดับความสำคัญ</button>
        </div>
        
        <div id="result" class="mt-6 p-4 bg-gray-100 rounded min-h-[100px]"></div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
