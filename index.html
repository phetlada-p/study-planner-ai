<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Smart Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fff5f8;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-[3rem] shadow-xl shadow-pink-100 overflow-hidden border border-pink-50">
        <div class="bg-[#ff85b3] p-8 text-white text-center">
            <h1 class="text-3xl font-bold italic">🌸 Study Planner Pro 📚</h1>
            <p class="text-pink-100 text-sm mt-2">วางแผนการเรียนแบบคนมีวันหยุด</p>
        </div>

        <div class="p-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-600 font-bold mb-1">ชื่อวิชา</label>
                    <input type="text" id="name" class="w-full p-3 rounded-2xl bg-pink-50 border-none focus:ring-2 focus:ring-pink-300 outline-none" placeholder="เช่น Robotic, Calculus...">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">วันที่ได้รับงาน</label>
                        <input type="date" id="assigned_date" class="w-full p-3 rounded-2xl bg-pink-50 border-none outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 font-bold mb-1">วันครบกำหนดส่ง</label>
                        <input type="date" id="deadline" class="w-full p-3 rounded-2xl bg-pink-50 border-none outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-600 font-bold mb-1">ระดับความยาก</label>
                    <select id="difficulty" class="w-full p-3 rounded-2xl bg-pink-50 border-none outline-none cursor-pointer">
                        <option value="1">⭐ ง่าย (เป้าหมาย 10 ชม.)</option>
                        <option value="2" selected>⭐⭐ ปานกลาง (เป้าหมาย 30 ชม.)</option>
                        <option value="3">⭐⭐⭐ ยาก (เป้าหมาย 60 ชม.)</option>
                    </select>
                </div>

                <div class="mt-6 p-5 bg-pink-50/50 rounded-[2rem] border border-pink-100">
                    <label class="block text-sm font-bold text-pink-600 mb-3 flex items-center gap-2">
                        <span>🚫 เลือกวันหยุดประจำสัปดาห์ (ไม่นับเวลาเรียน):</span>
                    </label>
                    <div class="flex flex-wrap gap-2">
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="1" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> จ.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="2" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> อ.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="3" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> พ.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="4" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> พฤ.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="5" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> ศ.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="6" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> ส.
                        </label>
                        <label class="flex items-center gap-1 text-[12px] bg-white px-3 py-2 rounded-full border border-pink-200 cursor-pointer hover:bg-pink-100 transition-all">
                            <input type="checkbox" class="day-off-input hidden" value="0" onchange="this.parentElement.classList.toggle('bg-pink-400'); this.parentElement.classList.toggle('text-white')"> อา.
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="addSubject()" class="bg-[#ff85b3] text-white p-4 rounded-2xl font-bold shadow-lg shadow-pink-200 hover:scale-105 transition-transform active:scale-95">➕ เพิ่มวิชา</button>
                    <button onclick="loadSchedule()" class="bg-[#7c66e3] text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:scale-105 transition-transform active:scale-95">📅 ดูตารางเรียน</button>
                </div>
            </div>
        </div>

        <div id="result" class="p-8 border-t border-pink-50">
            </div>

        <div id="list" class="p-8 bg-gray-50/50">
            </div>
    </div>

    <script src="scrip.js"></script>
</body>
</html>
